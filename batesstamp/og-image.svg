<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Gold accent line -->
  <rect x="100" y="120" width="1000" height="3" fill="#c9a227" rx="1.5" />

  <!-- Main title -->
  <text x="600" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">BatesStamp.com</text>

  <!-- Subtitle -->
  <text x="600" y="360" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">Free Bates Stamping Tool</text>

  <!-- Bottom description -->
  <text x="600" y="490" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="0.5">Secure, client-side PDF document numbering for legal professionals</text>

  <!-- Bottom gold accent line -->
  <rect x="100" y="510" width="1000" height="3" fill="#c9a227" rx="1.5" />
</svg>
